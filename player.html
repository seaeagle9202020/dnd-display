<!DOCTYPE html>
<html>
<head>
<title>D&D Player Display</title>

<style>
body {
    margin: 0;
    background: black;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}
</style>

</head>

<body>

<img id="scene" src="https://picsum.photos/1200/800">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyCLJeRx8QhjZFvtZoJuuPzSQlg6Vebf9lA",
  authDomain: "dnd-display.firebaseapp.com",
  databaseURL: "https://dnd-display-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dnd-display",
  storageBucket: "dnd-display.firebasestorage.app",
  messagingSenderId: "975109810443",
  appId: "1:975109810443:web:5f47e4bf2c6e71de9c1a0e"
};


const app = initializeApp(firebaseConfig);

const database = getDatabase(app);

const sceneRef = ref(database, "currentScene");


onValue(sceneRef, (snapshot) => {

    const image = snapshot.val();

    if(image){
        document.getElementById("scene").src = image;
    }

});

</script>

</body>
</html>
