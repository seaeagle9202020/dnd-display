<!DOCTYPE html>
<html>

<head>
<title>D&D Control Panel</title>

<style>

body {
    font-family: Arial;
    background: #222;
    color: white;
    text-align: center;
}

h1 {
    font-size: 40px;
}

.category {
    margin-top: 30px;
}

button {
    width: 200px;
    height: 70px;
    font-size: 22px;
    margin: 10px;
    cursor: pointer;
}

</style>

</head>

<body>

<h1>Dungeon Master Control</h1>


<div class="category">

<h2>🏰 Locations</h2>

<button onclick="changeScene('Display Images/Locations/Cave.webp')">
Generic Cave
</button>

<button onclick="changeScene('Display Images/Locations/gnomengarde.webp')">
Gnomengarde
</button>

<button onclick="changeScene('Display Images/Locations/swordcoast_map.jpg')">
Sword Coast
</button>

<button onclick="changeScene('Display Images/Locations/Wave Echo Cave.jfif')">
Wave Echo Cave
</button>

</div>


<div class="category">

<h2>👹 Monsters</h2>

<button onclick="changeScene('Display Images/monsters/Kobold.jpg')">
Kobold
</button>

<button onclick="changeScene('Display Images/monsters/Stirge.jpg')">
Stirge
</button>

<button onclick="changeScene('Display Images/monsters/White Dragon.png')">
White Dragon
</button>
    
</div>


<div class="category">
Infernal Chancellor Lazivos
<h2> NPC </h2>

<button onclick="changeScene('Display Images/NPC/Devil.png')">
Kobold
</button>

<button onclick="changeScene('Display Images/NPC/nixie_mum.jpg')">
Nixie's Mum
</button>

    
</div>


    
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyCLJeRx8QhjZFvtZoJuuPzSQlg6Vebf9lA",
  authDomain: "dnd-display.firebaseapp.com",
  databaseURL: "https://dnd-display-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dnd-display",
  storageBucket: "dnd-display.firebasestorage.app",
  messagingSenderId: "975109810443",
  appId: "1:975109810443:web:5f47e4bf2c6e71de9c1a0e"
};


const app = initializeApp(firebaseConfig);

const database = getDatabase(app);


function changeScene(image){

    set(
        ref(database, "currentScene"),
        image
    );

}

window.changeScene = changeScene;


</script>


</body>

</html>
