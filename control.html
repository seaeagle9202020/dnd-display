<!DOCTYPE html>
<html>

<head>

<title>D&D Control Panel</title>

<style>

body {
    font-family: Arial;
    background: #222;
    color: white;
    text-align: center;
}

button {
    width: 220px;
    height: 80px;
    font-size: 24px;
    margin: 15px;
    cursor: pointer;
}

</style>

</head>

<body>

<h1>Dungeon Master Control</h1>

<button onclick="changeScene('images/test.jpg')">
Test Image
</button>

<button onclick="changeScene('https://picsum.photos/1200/800?2')">
👹 Goblin
</button>

<button onclick="changeScene('https://picsum.photos/1200/800?3')">
🐉 Dragon
</button>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyCLJeRx8QhjZFvtZoJuuPzSQlg6Vebf9lA",
  authDomain: "dnd-display.firebaseapp.com",
  databaseURL: "https://dnd-display-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dnd-display",
  storageBucket: "dnd-display.firebasestorage.app",
  messagingSenderId: "975109810443",
  appId: "1:975109810443:web:5f47e4bf2c6e71de9c1a0e"
};


const app = initializeApp(firebaseConfig);

const database = getDatabase(app);


function changeScene(image){

    set(
        ref(database, "currentScene"),
        image
    );

}

window.changeScene = changeScene;


</script>

</body>

</html>
