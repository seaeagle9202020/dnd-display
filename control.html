<!DOCTYPE html>
<html>

<head>
<title>D&D Control Panel</title>

<style>

body {
    font-family: Arial;
    background: #222;
    color: white;
    text-align: center;
}

h1 {
    font-size: 40px;
}

.category {
    margin-top: 30px;
}

button {
    width: 200px;
    height: 70px;
    font-size: 22px;
    margin: 10px;
    cursor: pointer;
}

</style>

</head>

<body>

<h1>Dungeon Master Control</h1>

<h2>Session 11</h2>


<div class="category">

<h2>📍 Locations</h2>


<h3>Wave Echo Cave</h3>

<button onclick="changeScene('images/locations/wave_echo_cave.jfif')">
Show Cave
</button>

<button onclick="changeScene('images/monsters/_kobold.jpg')">
Kobold
</button>

<button onclick="changeScene('images/monsters/_stirge.jpg')">
Stirge
</button>


<h3>Gnomengarde</h3>

<button onclick="changeScene('images/locations/gnomengarde.webp')">
Show Gnomengarde
</button>


</div>



<div class="category">

<h2>🗺 Maps</h2>

<button onclick="changeScene('images/locations/swordcoast_map.jpg')">
Sword Coast
</button>

</div>



<div class="category">

<h2>👹 Quick Monsters</h2>

<button onclick="changeScene('images/monsters/white_dragon.png')">
White Dragon
</button>

</div>


<div class="category">

<h2>🌎 Environments</h2>

<button onclick="changeScene('images/environments/cave.jpg')">
Cave
</button>

<button onclick="changeScene('images/environments/tunnel.jpg')">
Tunnel
</button>

</div>


<div class="category">

<h2>👤 NPCs</h2>

<button onclick="changeScene('images/npcs/devil.png')">
Chancellor Lazivos
</button>

<button onclick="changeScene('images/npcs/nixie_mum.jpg')">
Nixie's Mum
</button>

</div>


    
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {
  apiKey: "AIzaSyCLJeRx8QhjZFvtZoJuuPzSQlg6Vebf9lA",
  authDomain: "dnd-display.firebaseapp.com",
  databaseURL: "https://dnd-display-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dnd-display",
  storageBucket: "dnd-display.firebasestorage.app",
  messagingSenderId: "975109810443",
  appId: "1:975109810443:web:5f47e4bf2c6e71de9c1a0e"
};


const app = initializeApp(firebaseConfig);

const database = getDatabase(app);


function changeScene(image){

    set(
        ref(database, "currentScene"),
        image
    );

}

window.changeScene = changeScene;


</script>


</body>

</html>
